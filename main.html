<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Mining Clicker</title>
<style>
html, body {
  margin:0;
  padding:0;
  width:100%;
  height:100%;
  overflow:hidden;
  font-family: Arial;
  text-align:center;
  color:white;
  background: url('https://raw.githubusercontent.com/MNEFSID/Mining-Clicker/refs/heads/main/Main.png') no-repeat center center fixed;
  background-size: cover;
}

/* STATUS BAR */
#status {
  margin:15px auto;
  padding:10px 20px;
  border:3px solid white;
  border-radius:15px;
  display:flex;
  justify-content:center;
  gap:30px;
  font-size:18px;
  background: rgba(0,0,0,0.5);
  max-width:600px;
  transition: 0.3s;
}

#status.level-up {
  border-color: gold;
  box-shadow: 0 0 15px gold;
  animation: glow 0.5s alternate 3;
}

@keyframes glow {
  0% { box-shadow: 0 0 10px gold; }
  100% { box-shadow: 0 0 25px gold; }
}

#status span.money {
  color:#0f0;
  font-weight:bold;
}

/* ROCK */
#rock-container {
  position: relative;
  width: 100%;
  height: calc(100vh - 280px);
  display: flex;
  align-items: center;
  justify-content: center;
}

#rock {
  width:150px;
  height:150px;
  cursor:pointer;
  background: url('https://raw.githubusercontent.com/MNEFSID/Mining-Clicker/refs/heads/main/Stone.png') no-repeat center center;
  background-size: contain;
  transition: transform 0.1s;
}

@keyframes idleRock {
  0% { transform: translateY(0); }
  50% { transform: translateY(-5px); }
  100% { transform: translateY(0); }
}
#rock.idle {
  animation: idleRock 2s infinite;
}

#rock.shake {
  animation: shake 0.2s;
}

@keyframes shake {
  0% { transform: translate(1px, 1px) rotate(0deg); }
  20% { transform: translate(-1px, -2px) rotate(-1deg); }
  40% { transform: translate(-3px, 0px) rotate(1deg); }
  60% { transform: translate(3px, 2px) rotate(0deg); }
  80% { transform: translate(1px, -1px) rotate(1deg); }
  100% { transform: translate(-1px, 2px) rotate(-1deg); }
}

/* floating +1 Stone */
.floating-text {
  position:absolute;
  color:#0f0;
  font-weight:bold;
  animation: floatFade 1s forwards;
  pointer-events:none;
}

@keyframes floatFade {
  0% { opacity:1; transform:translateY(0);}
  100% { opacity:0; transform:translateY(-50px);}
}

/* MENU BUTTONS */
#menu-buttons {
  display: flex;
  justify-content: center;
  gap: 10px;
  margin-top: 15px;
}
#menu-buttons button {
  padding: 15px 25px;
  font-size: 18px;
  font-weight: bold;
  border: none;
  border-radius: 12px;
  cursor: pointer;
  min-width: 130px;
  color: black;
  background: #FFD700;
  transform: translateY(0);
  transition: transform 0.1s, background 0.1s;
  box-shadow: 0 4px #B8860B;
}
#menu-buttons button:active {
  transform: translateY(4px);
  box-shadow: 0 0 #B8860B;
}
#menu-buttons button:hover {
  background: #FFC700;
}

/* SUB BUTTONS */
#sub-buttons {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin-top: 10px;
}
#sub-buttons button {
  padding: 15px 60px;
  font-size: 18px;
  font-weight: bold;
  border: none;
  border-radius: 12px;
  cursor: pointer;
  color: black;
  background: #FFD700;
  transform: translateY(0);
  transition: transform 0.1s, background 0.1s;
  box-shadow: 0 4px #B8860B;
}
#sub-buttons button:active {
  transform: translateY(4px);
  box-shadow: 0 0 #B8860B;
}
#sub-buttons button:hover {
  background: #FFC700;
}

/* INVENTORY POPUP */
#inventory-popup {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scale(0);
  width: 80%;
  max-width: 500px;
  height: 60%;
  background: rgba(0,0,0,0.9);
  border: 3px solid #FFD700;
  border-radius: 15px;
  padding: 15px;
  display: flex;
  flex-direction: column;
  z-index: 9999;
  opacity: 0;
  transition: transform 0.3s ease, opacity 0.3s ease;
}

#inventory-popup.show {
  transform: translate(-50%, -50%) scale(1);
  opacity: 1;
}

#inventory-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 10px;
}

#inventory-header h2 {
  margin: 0;
  color: #FFD700;
}

#close-inv {
  background: red;
  border: none;
  color: white;
  font-size: 18px;
  border-radius: 8px;
  cursor: pointer;
  padding: 2px 8px;
}

#inv-grid {
  flex: 1;
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  grid-gap: 15px;
  padding: 10px;
  justify-items: center;
}

.inv-slot-container {
  display: flex;
  flex-direction: column;
  align-items: center;
}

.inv-slot {
  width: 60px;
  height: 60px;
  background: rgba(255,255,255,0.1);
  border: 2px solid #FFD700;
  border-radius: 8px;
  position: relative;
  display: flex;
  justify-content: center;
  align-items: center;
}

.inv-slot img {
  width: 40px;
  height: 40px;
}

.stack-number {
  position: absolute;
  bottom: 2px;
  right: 4px;
  font-size: 12px;
  color: white;
  font-weight: bold;
  text-shadow: 0 0 3px black;
}

.item-name {
  margin-top: 4px;
  font-size: 14px;
  color: #FFD700;
}

/* PROGRESS BAR */
#progress-container {
  width: 80%;
  height: 25px;
  background: rgba(255,255,255,0.2);
  border-radius: 12px;
  margin: 10px auto;
  overflow: hidden;
}

#progress-bar {
  width: 0%;
  height: 100%;
  background: linear-gradient(90deg, #FFD700 0%, #FFC700 50%, #FFD700 100%);
  border-radius: 12px;
  transition: width 0.2s;
  background-size: 200% 100%;
  animation: gradientMove 1.5s linear infinite;
}

@keyframes gradientMove {
  0% { background-position: 0 0; }
  100% { background-position: -200% 0; }
}
</style>
</head>
<body>

<div id="status">
  <div>🪨 Stone: <span id="stone">0</span></div>
  <div>💰 $: <span id="money" class="money">0</span></div>
  <div>⭐ Level: <span id="level">0</span></div>
</div>

<div id="progress-container">
  <div id="progress-bar"></div>
</div>

<div id="rock-container">
  <div id="rock" class="idle"></div>
</div>

<div id="menu-buttons">
  <button id="inventory-btn">Inventory</button>
  <button onclick="alert('Build Up!')">Build Up</button>
  <button onclick="alert('Leaderboard!')">Leaderboard</button>
</div>

<div id="sub-buttons">
  <button id="sellBtn">Sell</button>
  <button id="shopBtn">Shop</button>
</div>

<div id="inventory-popup">
  <div id="inventory-header">
    <h2>Inventory</h2>
    <button id="close-inv">✖</button>
  </div>
  <div id="inv-grid"></div>
</div>

<audio id="hitSound" src="https://github.com/MNEFSID/Mining-Clicker/raw/refs/heads/main/Crack.mp3"></audio>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-analytics.js";
import { getDatabase, ref, get, set } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyAetAXBUTmd33SQbmArFE9HnMaqCl1gdNc",
  authDomain: "miningclickergame.firebaseapp.com",
  databaseURL: "https://miningclickergame-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "miningclickergame",
  storageBucket: "miningclickergame.firebasestorage.app",
  messagingSenderId: "379862875129",
  appId: "1:379862875129:web:7de4eb8d3b52befd78db28",
  measurementId: "G-VQGX0S3ZCS"
};

const app = initializeApp(firebaseConfig);
const analytics = getAnalytics(app);
const db = getDatabase();

const urlParams = new URLSearchParams(window.location.search);
const uid = urlParams.get("uid");
if (!uid) { alert("Login dulu!"); window.location.href="index.html"; }

let stone = 0;
let money = 0;
let level = 0;
let inventory = [];

const stoneText = document.getElementById("stone");
const moneyText = document.getElementById("money");
const levelText = document.getElementById("level");
const rock = document.getElementById("rock");
const hitSound = document.getElementById("hitSound");
const rockContainer = document.getElementById("rock-container");
const progressBar = document.getElementById("progress-bar");

const inventoryPopup = document.getElementById("inventory-popup");
const invGrid = document.getElementById("inv-grid");
const inventoryBtn = document.getElementById("inventory-btn");
const closeInvBtn = document.getElementById("close-inv");

// INVENTORY ANIMASI
inventoryBtn.onclick = () => { inventoryPopup.classList.add("show"); renderInventory(); };
closeInvBtn.onclick = () => inventoryPopup.classList.remove("show");

// RENDER INVENTORY
function renderInventory(){
  invGrid.innerHTML = "";
  for(let i=0;i<20;i++){
    const container = document.createElement("div");
    container.className="inv-slot-container";

    const slot = document.createElement("div");
    slot.className="inv-slot";

    if(inventory[i]){
      const img = document.createElement("img");
      img.src = "https://raw.githubusercontent.com/MNEFSID/Mining-Clicker/refs/heads/main/Stone.png";
      slot.appendChild(img);

      if(inventory[i].qty>1){
        const stack = document.createElement("div");
        stack.className="stack-number";
        stack.innerText = inventory[i].qty;
        slot.appendChild(stack);
      }

      const name = document.createElement("div");
      name.className="item-name";
      name.innerText = inventory[i].type;
      container.appendChild(slot);
      container.appendChild(name);
    } else {
      container.appendChild(slot);
      const name = document.createElement("div");
      name.className="item-name";
      container.appendChild(name);
    }
    invGrid.appendChild(container);
  }
}

// TAMBAH STONE KE INVENTORY
function addStoneToInventory(){
  let stoneSlot = inventory.find(s=>s.type==="stone");
  if(stoneSlot) stoneSlot.qty +=1;
  else inventory.push({type:"stone", qty:1});
  renderInventory();
}

// ROCK CLICK
rock.onclick = () => {
  stone += 1;

  // floating +1 Stone
  const float = document.createElement("div");
  float.className="floating-text";
  float.innerText="+1 Stone";
  const rect = rock.getBoundingClientRect();
  const containerRect = rockContainer.getBoundingClientRect();
  float.style.left=(rect.left+rect.width/2-containerRect.left+(Math.random()*30-15))+"px";
  float.style.top=(rect.top+rect.height/2-containerRect.top+(Math.random()*30-15))+"px";
  rockContainer.appendChild(float);
  setTimeout(()=>float.remove(),1000);

  addStoneToInventory();

  rock.classList.add("shake");
  setTimeout(()=>rock.classList.remove("shake"),200);
  hitSound.currentTime=0;
  hitSound.play();

  updateUI();

  // simpan firebase
  set(ref(db,'users/'+uid+'/stone'),stone);
  set(ref(db,'users/'+uid+'/inventory'),inventory);
};

const stonesPerLevel = 5; // jumlah stone untuk naik level

function updateUI(){
  stoneText.innerText = stone;
  moneyText.innerText = money;
  levelText.innerText = level;

  // Update progress bar
  let progress = (stone % stonesPerLevel) / stonesPerLevel * 100;
  progressBar.style.width = progress + "%";

  // Level up otomatis
  if(stone >= (level + 1) * stonesPerLevel){
    level += 1;
    const status = document.getElementById("status");
    status.classList.add("level-up");
    setTimeout(()=>status.classList.remove("level-up"), 1000);
  }
}

// AMBIL DATA DARI FIREBASE
get(ref(db,'users/'+uid)).then(snapshot=>{
  if(snapshot.exists()){
    const data=snapshot.val();
    stone=data.stone||0;
    money=data.money||0;
    level=data.level||0;
    inventory=data.inventory||[];
    renderInventory();
    updateUI();
  }
});
</script>
</body>
  </html>

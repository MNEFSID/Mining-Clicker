<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Mining Clicker</title>
<style>
html, body {
  margin:0;
  padding:0;
  width:100%;
  height:100%;
  overflow:hidden;
  font-family: Arial;
  text-align:center;
  color:white;
  background: url('https://raw.githubusercontent.com/MNEFSID/Mining-Clicker/refs/heads/main/Main.png') no-repeat center center fixed;
  background-size: cover;
}

/* STATUS BAR */
#status {
  margin:15px auto;
  padding:10px 20px;
  border:3px solid white;
  border-radius:15px;
  display:flex;
  justify-content:center;
  gap:30px;
  font-size:18px;
  background: rgba(0,0,0,0.5);
  max-width:600px;
  transition: 0.3s;
}
#status.level-up {
  border-color: gold;
  box-shadow: 0 0 10px gold;
}
#status span.money {
  color:#0f0;
  font-weight:bold;
}

/* ROCK */
#rock-container {
  position: relative;
  width: 100%;
  height: calc(100vh - 280px);
  display: flex;
  align-items: center;
  justify-content: center;
}
#rock {
  width:150px;
  height:150px;
  cursor:pointer;
  background: url('https://raw.githubusercontent.com/MNEFSID/Mining-Clicker/refs/heads/main/Stone.png') no-repeat center center;
  background-size: contain;
  transition: transform 0.1s;
}
@keyframes idleRock {0% {transform:translateY(0);}50% {transform:translateY(-5px);}100% {transform:translateY(0);}}
#rock.idle {animation: idleRock 2s infinite;}
#rock.shake {animation: shake 0.2s;}
@keyframes shake {
  0% {transform:translate(1px,1px) rotate(0deg);}
  20% {transform:translate(-1px,-2px) rotate(-1deg);}
  40% {transform:translate(-3px,0px) rotate(1deg);}
  60% {transform:translate(3px,2px) rotate(0deg);}
  80% {transform:translate(1px,-1px) rotate(1deg);}
  100% {transform:translate(-1px,2px) rotate(-1deg);}
}

/* floating +1 Stone */
.floating-text {
  position:absolute;
  color:#0f0;
  font-weight:bold;
  animation: floatFade 1s forwards;
  pointer-events:none;
}
@keyframes floatFade {
  0% { opacity:1; transform:translateY(0);}
  100% { opacity:0; transform:translateY(-50px);}
}

/* MENU BUTTONS */
#menu-buttons {display:flex; justify-content:center; gap:10px; margin-top:15px;}
#menu-buttons button {
  padding:10px 20px;
  font-size:16px;
  font-weight:bold;
  border:none;
  border-radius:12px;
  cursor:pointer;
  min-width:120px;
  color:black;
  background:#FFD700;
  transform:translateY(0);
  transition: transform 0.1s, background 0.1s;
  box-shadow: 0 4px #B8860B;
}
#menu-buttons button:active {transform:translateY(4px); box-shadow:0 0 #B8860B;}
#menu-buttons button:hover {background:#FFC700;}

/* PROGRESS BAR */
#progress-container {
  width: 80%;
  height: 25px;
  background: rgba(255,255,255,0.2);
  border-radius: 12px;
  margin: 10px auto;
  overflow: hidden;
}
#progress-bar {
  width: 0%;
  height: 100%;
  background: linear-gradient(90deg, #FFD700, #FFC700);
  border-radius:12px;
  transition: width 0.4s ease;
}

/* SUB BUTTONS */
#sub-buttons {display:flex; justify-content:center; gap:20px; margin-top:10px;}
#sub-buttons button {
  padding:10px 50px;
  font-size:16px;
  font-weight:bold;
  border:none;
  border-radius:12px;
  cursor:pointer;
  color:black;
  background:#FFD700;
  transform:translateY(0);
  transition: transform 0.1s, background 0.1s;
  box-shadow:0 4px #B8860B;
}
#sub-buttons button:active {transform:translateY(4px); box-shadow:0 0 #B8860B;}
#sub-buttons button:hover {background:#FFC700;}

/* INVENTORY POPUP */
#inventory-popup {
  position: fixed;
  top:50%;
  left:50%;
  transform: translate(-50%, -50%);
  width: 80%;
  max-width:500px;
  height: 60%;
  background: rgba(0,0,0,0.9);
  border:3px solid #FFD700;
  border-radius:15px;
  padding:15px;
  display: flex;
  flex-direction: column;
  z-index:9999;
  transition: transform 0.3s, opacity 0.3s;
  opacity:0;
  pointer-events:none;
}
#inventory-popup.show {opacity:1; pointer-events:auto; transform:translate(-50%,-50%) scale(1);}
#inventory-header {display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;}
#inventory-header h2 {margin:0; color:#FFD700;}
#close-inv {background:red; border:none; color:white; font-size:18px; border-radius:8px; cursor:pointer; padding:2px 8px;}
#inv-grid {flex:1; display:grid; grid-template-columns:repeat(5,1fr); grid-gap:10px; padding:10px; border-radius:10px;}
.inv-slot {position:relative; background: rgba(255,255,255,0.05); border-radius:8px; width:100%; height:80px; display:flex; justify-content:center; align-items:center;}
.inv-slot img {max-width:60%; max-height:60%;}
.stack {position:absolute; bottom:3px; right:3px; color:white; font-size:14px; font-weight:bold;}
.item-name {text-align:center; margin-top:3px; font-size:14px; color:white;}
</style>
</head>
<body>

<div id="status">
  <div> 🪨 Stone: <span id="stonetone">0</span></div>
  <div> 💰 spanspan id="money" class="money">0</span></div>
  <dLeve⭐ level: <span id="level">0</span></div>
</div>

<div id="progress-container">
  <div id="progress-bar"></div>
</div>

<div id="rock-container">
  <div id="rock" class="idle"></div>
</div>

<div id="menu-buttons">
  <button id="inventory-btn">Inventory</button>
  <button onclick="window.location.href='buildup.html'">Build Up</button>
  <button onclick="window.location.href='leaderboard.html'">Leaderboard</button>
</div>

<div id="sub-buttons">
  <button id="sellBtn">💵Sell</button>
  <button id="shopBtn">🛒Shop</button>
</div>

<div id="inventory-popup">
  <div id="inventory-header">
    <h2>Inventory</h2>
    <button id="close-inv">✖</button>
  </div>
  <div id="inv-grid"></div>
</div>

<audio id="hitSound" src="https://github.com/MNEFSID/Mining-Clicker/raw/refs/heads/main/Crack.mp3"></audio>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-analytics.js";
import { getDatabase, ref, get, set } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyAetAXBUTmd33SQbmArFE9HnMaqCl1gdNc",
  authDomain: "miningclickergame.firebaseapp.com",
  databaseURL: "https://miningclickergame-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "miningclickergame",
  storageBucket: "miningclickergame.firebasestorage.app",
  messagingSenderId: "379862875129",
  appId: "1:379862875129:web:7de4eb8d3b52befd78db28",
  measurementId: "G-VQGX0S3ZCS"
};

const app = initializeApp(firebaseConfig);
const analytics = getAnalytics(app);
const db = getDatabase();

const urlParams = new URLSearchParams(window.location.search);
const uid = urlParams.get("uid");
if(!uid){alert("Login dulu!"); window.location.href="index.html";}

let stone=0, money=0, level=0;
let inventory=[];

const stoneText=document.getElementById("stone");
const moneyText=document.getElementById("money");
const levelText=document.getElementById("level");
const rock=document.getElementById("rock");
const hitSound=document.getElementById("hitSound");
const rockContainer=document.getElementById("rock-container");
const progressBar=document.getElementById("progress-bar");
const inventoryPopup=document.getElementById("inventory-popup");
const invGrid=document.getElementById("inv-grid");
const inventoryBtn=document.getElementById("inventory-btn");
const closeInvBtn=document.getElementById("close-inv");

inventoryBtn.onclick = ()=>{inventoryPopup.classList.add("show"); renderInventory();}
closeInvBtn.onclick = ()=>{inventoryPopup.classList.remove("show");}

document.getElementById("sellBtn").onclick = ()=>alert("Sell tombol dipencet!");
document.getElementById("shopBtn").onclick = ()=>alert("Shop tombol dipencet!");

function getLevelTarget(nextLevel){return 10+nextLevel*5;}

function updateProgressBar(){
  const target=getLevelTarget(level+1);
  const percent=Math.min((stone/target)*100,100);
  progressBar.style.width = percent+"%";
}

function updateUI(){
  stoneText.innerText = stone;
  moneyText.innerText = money;
  levelText.innerText = level;
  updateProgressBar();
  renderInventory();
}

// inventory render pake gambar
function renderInventory(){
  invGrid.innerHTML="";
  for(let i=0;i<20;i++){
    const slot=document.createElement("div");
    slot.className="inv-slot";
    if(inventory[i]){
      const img=document.createElement("img");
      if(inventory[i].type==="stone") img.src="https://raw.githubusercontent.com/MNEFSID/Mining-Clicker/refs/heads/main/Stone.png";
      slot.appendChild(img);
      const stack=document.createElement("div");
      stack.className="stack";
      stack.innerText=inventory[i].qty;
      slot.appendChild(stack);

      const name=document.createElement("div");
      name.className="item-name";
      name.innerText=inventory[i].type;
      slot.appendChild(name);
    }
    invGrid.appendChild(slot);
  }
}

function addStoneToInventory(){
  let stoneSlot=inventory.find(s=>s.type==="stone");
  if(stoneSlot) stoneSlot.qty+=1;
  else inventory.push({type:"stone", qty:1});
}

rock.onclick = ()=>{
  stone+=1;
  addStoneToInventory();

  const target=getLevelTarget(level+1);
  if(stone>=target){stone=0; level+=1;}

  const float=document.createElement("div");
  float.className="floating-text";
  float.innerText="+1 Stone";
  const rect=rock.getBoundingClientRect();
  const containerRect=rockContainer.getBoundingClientRect();
  float.style.left=(rect.left+rect.width/2-containerRect.left+(Math.random()*30-15))+"px";
  float.style.top=(rect.top+rect.height/2-containerRect.top+(Math.random()*30-15))+"px";
  rockContainer.appendChild(float);
  setTimeout(()=>float.remove(),1000);

  rock.classList.add("shake");
  setTimeout(()=>rock.classList.remove("shake"),200);
  hitSound.currentTime=0;
  hitSound.play();
  updateUI();

  set(ref(db,'users/'+uid+'/stone'),stone);
  set(ref(db,'users/'+uid+'/level'),level);
  set(ref(db,'users/'+uid+'/inventory'),inventory);
};

get(ref(db,'users/'+uid)).then(snapshot=>{
  if(snapshot.exists()){
    const data=snapshot.val();
    stone=data.stone||0;
    money=data.money||0;
    level=data.level||0;
    inventory=data.inventory||[];
    updateUI();
  }
});

updateUI();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Mining Clicker</title>

<style>
html, body {
  margin:0;
  padding:0;
  width:100%;
  height:100%;
  overflow:hidden;
  font-family: Arial;
  text-align:center;
  color:white;
  background: url('https://raw.githubusercontent.com/MNEFSID/Mining-Clicker/refs/heads/main/file_000000002abc71fa9ddf9b7b2bdd92cb.png') no-repeat center center fixed;
  background-size: cover;
}

/* STATUS */
#status {
  margin:15px auto;
  padding:10px 20px;
  border:3px solid white;
  border-radius:15px;
  display:flex;
  justify-content:center;
  gap:30px;
  font-size:18px;
  background: rgba(0,0,0,0.5);
  max-width:600px;
}

#status span.money {
  color:#0f0;
  font-weight:bold;
}

/* ROCK */
#rock-container {
  height: calc(100vh - 280px);
  display:flex;
  align-items:center;
  justify-content:center;
}

#rock {
  width:150px;
  height:150px;
  cursor:pointer;
  background:url('https://raw.githubusercontent.com/MNEFSID/Mining-Clicker/refs/heads/main/Tak%20berjudul89_20260329081133.png') no-repeat center;
  background-size:contain;
}

/* BUTTON */
#menu-buttons {
  display:flex;
  justify-content:center;
  gap:15px;
  margin-top:15px;
}
#menu-buttons button {
  padding:20px;
  font-size:18px;
  border-radius:15px;
  background:#333;
  color:white;
}

/* PROGRESS */
#progress-container {
  width:80%;
  height:25px;
  background: rgba(255,255,255,0.2);
  border-radius:12px;
  margin:10px auto;
}
#progress-bar {
  width:0%;
  height:100%;
  background: gold;
}

/* INVENTORY */
#inventory-panel {
  position:absolute;
  bottom:120px;
  left:50%;
  transform:translateX(-50%);
  width:90%;
  max-width:500px;
  background:rgba(0,0,0,0.8);
  border:3px solid white;
  border-radius:15px;
  padding:10px;
  display:none;
}

#inv-grid {
  display:grid;
  grid-template-columns: repeat(5, 1fr);
  gap:10px;
}

.inv-slot {
  padding-top:100%;
  position:relative;
  background:rgba(255,255,255,0.1);
  border:2px solid white;
  border-radius:10px;
}

.inv-item {
  position:absolute;
  top:0; left:0; right:0; bottom:0;
  background-size:contain;
  background-repeat:no-repeat;
  background-position:center;
}

.inv-count {
  position:absolute;
  bottom:3px;
  right:5px;
  font-size:12px;
}
</style>
</head>

<body>

<div id="status">
  <div>Stone: <span id="stone">0</span></div>
  <div>$: <span id="money">0</span></div>
  <div>Level: <span id="level">0</span></div>
</div>

<div id="progress-container">
  <div id="progress-bar"></div>
</div>

<div id="rock-container">
  <div id="rock"></div>
</div>

<!-- INVENTORY -->
<div id="inventory-panel">
  <h3>Inventory</h3>
  <div id="inv-grid"></div>
</div>

<div id="menu-buttons">
  <button onclick="toggleInventory()">Inventory</button>
  <button onclick="window.location.href='buildup.html'">Build Up</button>
  <button onclick="window.location.href='leaderboard.html'">Leaderboard</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getDatabase, ref, get, set } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

const app = initializeApp({
  apiKey: "AIzaSy...",
  databaseURL: "https://miningclickergame-default-rtdb.asia-southeast1.firebasedatabase.app"
});

const db = getDatabase();

const uid = new URLSearchParams(window.location.search).get("uid");
if(!uid){ alert("Login dulu!"); location.href="index.html"; }

let stone=0, money=0, level=0;

////////// INVENTORY //////////
let inventory = { stone:0 };

function toggleInventory(){
  const p = document.getElementById("inventory-panel");
  p.style.display = p.style.display === "block" ? "none" : "block";
}

function renderInventory(){
  const grid = document.getElementById("inv-grid");
  grid.innerHTML="";

  const items = [
    {count: inventory.stone, img:"https://raw.githubusercontent.com/MNEFSID/Mining-Clicker/refs/heads/main/Tak%20berjudul89_20260329081133.png"}
  ];

  items.forEach(item=>{
    const slot=document.createElement("div");
    slot.className="inv-slot";

    if(item.count>0){
      const icon=document.createElement("div");
      icon.className="inv-item";
      icon.style.backgroundImage=`url(${item.img})`;

      const count=document.createElement("div");
      count.className="inv-count";
      count.innerText=item.count;

      slot.appendChild(icon);
      slot.appendChild(count);
    }

    grid.appendChild(slot);
  });
}

function updateUI(){
  document.getElementById("stone").innerText=stone;
  document.getElementById("money").innerText=money;
  document.getElementById("level").innerText=level;

  renderInventory();
}

get(ref(db,'users/'+uid)).then(s=>{
  if(s.exists()){
    const d=s.val();
    stone=d.stone||0;
    money=d.money||0;
    level=d.level||0;
    inventory=d.inventory||{stone:0};
    updateUI();
  }
});

document.getElementById("rock").onclick=()=>{
  stone++;
  inventory.stone++;

  if(stone>=10){
    level++;
    stone=0;
  }

  set(ref(db,'users/'+uid),{
    stone, money, level, inventory
  });

  updateUI();
};
</script>

</body>
</html>

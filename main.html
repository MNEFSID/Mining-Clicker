<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Mining Clicker</title>
<style>
html, body {
  margin:0;
  padding:0;
  width:100%;
  height:100%;
  overflow:hidden;
  font-family: Arial;
  text-align:center;
  color:white;
  background: url('https://raw.githubusercontent.com/MNEFSID/Mining-Clicker/refs/heads/main/Main.png') no-repeat center center fixed;
  background-size: cover;
}

/* STATUS BAR */
#status {
  margin:15px auto;
  padding:10px 20px;
  border:3px solid white;
  border-radius:15px;
  display:flex;
  justify-content:center;
  gap:30px;
  font-size:18px;
  background: rgba(0,0,0,0.5);
  max-width:600px;
  transition: 0.3s;
}

#status.level-up {
  border-color: gold;
  box-shadow: 0 0 10px gold;
}

#status span.money {
  color:#0f0; /* ijo neon */
  font-weight:bold;
}

/* ROCK */
#rock-container {
  position: relative;
  width: 100%;
  height: calc(100vh - 280px);
  display: flex;
  align-items: center;
  justify-content: center;
}

#rock {
  width:150px;
  height:150px;
  cursor:pointer;
  background: url('https://raw.githubusercontent.com/MNEFSID/Mining-Clicker/refs/heads/main/Stone.png') no-repeat center center;
  background-size: contain;
  transition: transform 0.1s;
}

@keyframes idleRock {
  0% { transform: translateY(0); }
  50% { transform: translateY(-5px); }
  100% { transform: translateY(0); }
}
#rock.idle {
  animation: idleRock 2s infinite;
}

#rock.shake {
  animation: shake 0.2s;
}

@keyframes shake {
  0% { transform: translate(1px, 1px) rotate(0deg); }
  20% { transform: translate(-1px, -2px) rotate(-1deg); }
  40% { transform: translate(-3px, 0px) rotate(1deg); }
  60% { transform: translate(3px, 2px) rotate(0deg); }
  80% { transform: translate(1px, -1px) rotate(1deg); }
  100% { transform: translate(-1px, 2px) rotate(-1deg); }
}

/* floating +1 Stone */
.floating-text {
  position:absolute;
  color:#0f0; /* ijo neon */
  font-weight:bold;
  animation: floatFade 1s forwards;
  pointer-events:none;
}

@keyframes floatFade {
  0% { opacity:1; transform:translateY(0);}
  100% { opacity:0; transform:translateY(-50px);}
}

<style>
/* MENU BUTTONS - 1 BARIS ATAS */
#menu-buttons {
  display: flex;
  justify-content: center;
  gap: 10px; /* jarak antar tombol */
  margin-top: 15px;
}
#menu-buttons button {
  padding: 15px 25px;
  font-size: 18px;
  font-weight: bold;
  border: none;
  border-radius: 12px;
  cursor: pointer;
  min-width: 130px;
  color: black;
  background: #FFD700; /* kuning */
  transform: translateY(0);
  transition: transform 0.1s, background 0.1s;
  box-shadow: 0 4px #B8860B; /* efek 3D tegas tapi sederhana */
}
#menu-buttons button:active {
  transform: translateY(4px); /* tombol “tekan masuk” */
  box-shadow: 0 0 #B8860B; /* hilang efek saat ditekan */
}
#menu-buttons button:hover {
  background: #FFC700;
}

#progress-container {
  width: 80%;
  height: 25px;
  background: rgba(255,255,255,0.2);
  border-radius: 12px;
  margin: 10px auto;
  overflow: hidden;
}

#progress-bar {
  width: 0%;
  height: 100%;
  background: repeating-linear-gradient(
    45deg,
    #FFD700 0px,
    #FFD700 5px,
    #FFEC8B 5px,
    #FFEC8B 10px
  );
  background-size: 20px 20px;
  animation: moveStripe 1s linear infinite;
  border-radius: 12px;
  transition: width 0.2s;
}

@keyframes moveStripe {
  0% { background-position: 0 0; }
  100% { background-position: 20px 0; }
}

/* SUB BUTTONS - 2 BARIS BAWAH */
#sub-buttons {
  display: flex;
  justify-content: center;
  gap: 20px; /* jarak antar tombol */
  margin-top: 10px;
}
#sub-buttons button {
  padding: 15px 60px; /* tombol lebih lebar supaya mengisi space */
  font-size: 18px;
  font-weight: bold;
  border: none;
  border-radius: 12px;
  cursor: pointer;
  color: black;
  background: #FFD700;
  transform: translateY(0);
  transition: transform 0.1s, background 0.1s;
  box-shadow: 0 4px #B8860B;
}
#sub-buttons button:active {
  transform: translateY(4px);
  box-shadow: 0 0 #B8860B;
}
#sub-buttons button:hover {
  background: #FFC700;
}
#inventory-popup {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 80%;
  max-width: 500px;
  height: 60%;
  background: rgba(0,0,0,0.9);
  border: 3px solid #FFD700;
  border-radius: 15px;
  padding: 15px;
  display: flex;
  flex-direction: column;
  z-index: 9999;
}

#inventory-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 10px;
}

#inventory-header h2 {
  margin: 0;
  color: #FFD700;
}

#close-inv {
  background: red;
  border: none;
  color: white;
  font-size: 18px;
  border-radius: 8px;
  cursor: pointer;
  padding: 2px 8px;
}

#inv-grid {
  flex: 1;
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  grid-gap: 10px;
  background: rgba(255,255,255,0.05);
  padding: 10px;
  border-radius: 10px;
}

.inv-slot {
  background: rgba(255,255,255,0.1);
  border: 2px solid #FFD700;
  border-radius: 8px;
  width: 100%;
  height: 60px;
  display: flex;
  justify-content: center;
  align-items: center;
  font-weight: bold;
  color: white;
  font-size: 16px;
    }
</style>
</head>
<body>

<div id="status">
  <div>🪨 Stone: <span id="stone">0</span></div>
  <div>💰 $: <span id="money" class="money">0</span></div>
  <div>⭐ Level: <span id="level">0</span></div>
</div>

<div id="progress-container">
  <div id="progress-bar"></div>
</div>

<div id="rock-container">
  <div id="rock" class="idle"></div>
</div>

<div id="menu-buttons">
  <button onclick="window.location.href='inv.html'">Inventory</button>
  <button onclick="window.location.href='buildup.html'">Build Up</button>
  <button onclick="window.location.href='leaderboard.html'">Leaderboard</button>
</div>
  <!-- Tambahkan di bawah div #menu-buttons -->
<!-- INVENTORY POPUP -->
<div id="inventory-popup" style="display:none;">
  <div id="inventory-header">
    <h2>Inventory</h2>
    <button id="close-inv">✖</button>
  </div>
  <div id="inv-grid"></div>
</div>

<audio id="hitSound" src="https://github.com/MNEFSID/Mining-Clicker/raw/refs/heads/main/Crack.mp3"></audio>

<script type="module">
  // Optional: kasih alert atau aksi klik
document.getElementById("sellBtn").onclick = () => {
  alert("Sell tombol dipencet!");
};
document.getElementById("shopBtn").onclick = () => {
  alert("Shop tombol dipencet!");
};
  
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-analytics.js";
import { getDatabase, ref, get, set } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyAetAXBUTmd33SQbmArFE9HnMaqCl1gdNc",
  authDomain: "miningclickergame.firebaseapp.com",
  databaseURL: "https://miningclickergame-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "miningclickergame",
  storageBucket: "miningclickergame.firebasestorage.app",
  messagingSenderId: "379862875129",
  appId: "1:379862875129:web:7de4eb8d3b52befd78db28",
  measurementId: "G-VQGX0S3ZCS"
};

const app = initializeApp(firebaseConfig);
const analytics = getAnalytics(app);
const db = getDatabase();

const urlParams = new URLSearchParams(window.location.search);
const uid = urlParams.get("uid");
if (!uid) { alert("Login dulu!"); window.location.href="index.html"; }

let stone = 0;
let money = 0;
let level = 0;

const stoneText = document.getElementById("stone");
const moneyText = document.getElementById("money");
const levelText = document.getElementById("level");
const rock = document.getElementById("rock");
const hitSound = document.getElementById("hitSound");
const rockContainer = document.getElementById("rock-container");
const statusBar = document.getElementById("status");
const progressBar = document.getElementById("progress-bar");

// target klik tiap level
function getLevelTarget(level) {
  return level*10;
}

function updateProgress() {
  const target = getLevelTarget(level+1);
  let progressPercent = (stone / target) * 100;
  if(progressPercent > 100) progressPercent = 100;
  progressBar.style.width = progressPercent + "%";
}

function updateUI() {
  stoneText.innerText = stone;
  moneyText.innerText = money; // tetap tampil tapi tidak bertambah
  levelText.innerText = level;

  updateProgress();

  if (stone >= getLevelTarget(level+1)) {
    statusBar.classList.add("level-up");
    setTimeout(() => statusBar.classList.remove("level-up"), 1000);
  }
}

// ambil data user
get(ref(db, 'users/' + uid)).then(snapshot => {
  if (snapshot.exists()) {
    const data = snapshot.val();
    stone = data.stone || 0;
    money = data.money || 0;
    level = data.level || 0;
    updateUI();
  }
});

rock.onclick = () => {
  stone += 1; // hanya Stone bertambah

  const target = getLevelTarget(level+1);
  if(stone >= target){
    stone = target;
    level +=1;
    stone = 0; // reset stone
  }

  rock.classList.add("shake");
  setTimeout(() => rock.classList.remove("shake"), 200);

  hitSound.currentTime = 0;
  hitSound.play();

  // floating +1 Stone
  const float = document.createElement("div");
  float.className = "floating-text";
  float.innerText = "+1 Stone";
  const rect = rock.getBoundingClientRect();
  const containerRect = rockContainer.getBoundingClientRect();
  float.style.left = (rect.left + rect.width/2 - containerRect.left + (Math.random()*30-15)) + "px";
  float.style.top = (rect.top + rect.height/2 - containerRect.top + (Math.random()*30-15)) + "px";
  rockContainer.appendChild(float);
  setTimeout(() => float.remove(), 1000);

  set(ref(db, 'users/' + uid + '/stone'), stone);
  set(ref(db, 'users/' + uid + '/level'), level);

  updateUI();
};
// INVENTORY LOGIC
let inventory = []; // simpan semua item, misal: {type:'stone', qty:1}

const inventoryPopup = document.getElementById("inventory-popup");
const invGrid = document.getElementById("inv-grid");
const inventoryBtn = document.querySelector("#menu-buttons button:nth-child(1)");
const closeInvBtn = document.getElementById("close-inv");

// buka/tutup inventory
inventoryBtn.onclick = () => {
  renderInventory();
  inventoryPopup.style.display = "flex";
};
closeInvBtn.onclick = () => inventoryPopup.style.display = "none";

// render inventory
function renderInventory() {
  invGrid.innerHTML = "";
  for (let i = 0; i < 20; i++) {
    const slot = document.createElement("div");
    slot.className = "inv-slot";
    if(inventory[i]) slot.innerText = `${inventory[i].type} x${inventory[i].qty}`;
    invGrid.appendChild(slot);
  }
}

// tambahin stone ke inventory
function addStoneToInventory() {
  // cek ada slot stone di inventory
  let stoneSlot = inventory.find(s => s.type === "stone");
  if(stoneSlot) {
    stoneSlot.qty +=1;
  } else {
    inventory.push({type:'stone', qty:1});
  }
  renderInventory();
}

// modifikasi rock.onclick
rock.onclick = () => {
  stone += 1;

  // floating text
  const float = document.createElement("div");
  float.className = "floating-text";
  float.innerText = "+1 Stone";
  const rect = rock.getBoundingClientRect();
  const containerRect = rockContainer.getBoundingClientRect();
  float.style.left = (rect.left + rect.width/2 - containerRect.left + (Math.random()*30-15)) + "px";
  float.style.top = (rect.top + rect.height/2 - containerRect.top + (Math.random()*30-15)) + "px";
  rockContainer.appendChild(float);
  setTimeout(() => float.remove(), 1000);

  // tambah ke inventory
  addStoneToInventory();

  // level & reset stone utama
  const target = getLevelTarget(level+1);
  if(stone >= target){
    stone = 0; // reset UI main stone
    level +=1;
  }

  rock.classList.add("shake");
  setTimeout(() => rock.classList.remove("shake"), 200);
  hitSound.currentTime = 0;
  hitSound.play();

  // update UI
  updateUI();

  // simpan inventory & stone & level ke Firebase
  set(ref(db, 'users/' + uid + '/stone'), stone);
  set(ref(db, 'users/' + uid + '/level'), level);
  set(ref(db, 'users/' + uid + '/inventory'), inventory);
};

// ambil inventory dari firebase saat load
get(ref(db, 'users/' + uid)).then(snapshot => {
  if(snapshot.exists()){
    const data = snapshot.val();
    inventory = data.inventory || [];
    renderInventory();
  }
});

updateUI();
</script>
</body>
</html>
